{% extends "base.html" %}
{% block title %}Settings — C.R.E.E.D.{% endblock %}
{% block header_title %}Settings{% endblock %}

{% block content %}
<div class="auth-centered">
  <div class="auth-card">
    <h1 class="auth-title">Settings</h1>
    <p class="auth-subtitle">Change your password</p>
    <form method="POST" action="/settings" class="auth-form">
      <div class="form-group">
        <label for="current_password">Current Password</label>
        <input type="password" id="current_password" name="current_password" class="form-control" required>
      </div>
      <div class="form-group">
        <label for="new_password">New Password</label>
        <input type="password" id="new_password" name="new_password" class="form-control" required>
      </div>
      <div class="form-group">
        <label for="confirm_password">Confirm New Password</label>
        <input type="password" id="confirm_password" name="confirm_password" class="form-control" required>
      </div>
      <button type="submit" class="btn-lcars btn-lcars-full">Change Password</button>
    </form>
  </div>
</div>
{% endblock %}
