{% extends "base.html" %}
{% block title %}Setup — C.R.E.E.D.{% endblock %}
{% block header_title %}First Run Setup{% endblock %}

{% block content %}
<div class="auth-centered">
  <div class="auth-card">
    <h1 class="auth-title">Create Admin Account</h1>
    <p class="auth-subtitle">Initialize C.R.E.E.D. with an administrator account.</p>

    <form method="POST" action="/setup" class="auth-form">
      <div class="form-group">
        <label for="username">Username</label>
        <input type="text" id="username" name="username" class="form-control" autocomplete="username" required>
      </div>
      <div class="form-group">
        <label for="password">Password</label>
        <input type="password" id="password" name="password" class="form-control" autocomplete="new-password" required>
      </div>
      <div class="form-group">
        <label for="confirm_password">Confirm Password</label>
        <input type="password" id="confirm_password" name="confirm_password" class="form-control" autocomplete="new-password" required>
      </div>
      <button type="submit" class="btn-lcars btn-lcars-full">Create Admin</button>
    </form>
  </div>
</div>
{% endblock %}
